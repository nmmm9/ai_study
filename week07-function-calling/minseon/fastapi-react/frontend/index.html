<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청년도우미 v3 · Function Calling</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #212121; color: #ececec; height: 100vh; display: flex; overflow: hidden; }

    /* 사이드바 */
    .sidebar { width: 260px; min-width: 260px; background: #171717; display: flex; flex-direction: column; padding: 12px 8px; border-right: 1px solid #2a2a2a; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; padding: 4px 8px 14px; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg,#2563eb,#7c3aed); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .new-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #3f3f3f; background: transparent; color: #ececec; font-size: 14px; cursor: pointer; margin-bottom: 12px; }
    .new-btn:hover { background: #2a2a2a; }
    .sec-label { font-size: 11px; color: #6b7280; font-weight: 600; padding: 6px 10px 4px; text-transform: uppercase; letter-spacing: .05em; }
    .func-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
    .func-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13px; color: #9ca3af; }
    .func-item.active { background: #1e293b; color: #93c5fd; border: 1px solid #1e3a8a; }
    .func-icon { font-size: 16px; width: 22px; text-align: center; margin-top: 1px; }
    .func-name { font-weight: 600; font-size: 12px; }
    .func-desc { font-size: 11px; color: #6b7280; margin-top: 1px; }
    .sidebar-foot { padding: 10px 8px; border-top: 1px solid #2a2a2a; margin-top: auto; font-size: 11px; color: #4b5563; line-height: 1.6; }

    /* 메인 */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .hdr { display: flex; align-items: center; justify-content: center; padding: 12px 24px; border-bottom: 1px solid #2a2a2a; }
    .badge { display: flex; align-items: center; gap: 6px; padding: 5px 14px; border: 1px solid #3f3f3f; border-radius: 20px; font-size: 13px; }
    .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    /* 메시지 */
    .msgs { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; }
    .msgs::-webkit-scrollbar { width: 6px; }
    .msgs::-webkit-scrollbar-thumb { background: #3f3f3f; border-radius: 4px; }

    /* 빈 화면 */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 20px; padding: 40px; }
    .empty-icon { width: 64px; height: 64px; background: linear-gradient(135deg,#2563eb,#7c3aed); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .empty h2 { font-size: 20px; font-weight: 600; }
    .empty p { font-size: 14px; color: #8e8ea0; text-align: center; max-width: 420px; line-height: 1.7; }
    .sugg-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; max-width: 560px; width: 100%; }
    .sugg { background: #2a2a2a; border: 1px solid #3f3f3f; border-radius: 12px; padding: 14px; cursor: pointer; }
    .sugg:hover { border-color: #2563eb; background: #1e293b; }
    .sugg .si { font-size: 20px; margin-bottom: 6px; }
    .sugg .st { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .sugg .sd { font-size: 12px; color: #8e8ea0; }

    /* 유저 메시지 */
    .u-row { display: flex; justify-content: flex-end; padding: 6px 24px; }
    .u-bubble { background: #2f2f2f; border-radius: 18px 18px 4px 18px; padding: 12px 16px; max-width: 75%; font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }

    /* AI 메시지 */
    .a-row { padding: 6px 24px; max-width: 800px; width: 100%; align-self: center; }
    .a-content { font-size: 15px; line-height: 1.8; color: #ececec; word-break: break-word; min-height: 24px; }
    .a-content p { margin: 0 0 10px; }
    .a-content p:last-child { margin-bottom: 0; }
    .a-content h1,.a-content h2,.a-content h3 { font-size: 15px; font-weight: 700; margin: 14px 0 6px; color: #fff; }
    .a-content ul,.a-content ol { padding-left: 20px; margin: 6px 0 10px; }
    .a-content li { margin-bottom: 4px; }
    .a-content strong { font-weight: 700; color: #fff; }
    .a-content code { background: #2f2f2f; border-radius: 4px; padding: 2px 5px; font-size: 13px; color: #93c5fd; }
    .a-content table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .a-content th { background: #1e3a8a; color: #bfdbfe; padding: 7px 12px; text-align: left; font-size: 13px; }
    .a-content td { border-top: 1px solid #3f3f3f; padding: 7px 12px; font-size: 13px; color: #d1d5db; }
    .a-content tr:nth-child(even) td { background: #1a1a1a; }
    .a-content a { color: #60a5fa; }

    /* 로딩 */
    .dots { display: flex; gap: 5px; padding: 4px 0; }
    .dots span { width: 7px; height: 7px; background: #6b7280; border-radius: 50%; animation: bonce 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bonce { 0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.1);opacity:1} }
    .cursor { display: inline-block; animation: blink .8s infinite; color: #6b7280; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

    /* Function Calling 카드 */
    .fc-wrap { margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px; }
    .fc-box { background: #1a1a2e; border: 1px solid #2a3a5a; border-radius: 10px; padding: 10px 14px; font-size: 12px; }
    .fc-box.direct { background: #1a1a1a; border-color: #3f3f3f; }
    .fc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .fc-badge { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .fc-badge.call   { background: #1e3a8a; color: #93c5fd; }
    .fc-badge.direct { background: #1f2937; color: #9ca3af; }
    .fc-name { font-weight: 600; color: #e2e8f0; font-size: 13px; }
    .fc-args { color: #9ca3af; line-height: 1.6; }
    .fc-key { color: #7c3aed; }
    .fc-val { color: #93c5fd; }

    /* 파이프라인 */
    .pl-box { background: #1a1a1a; border: 1px solid #3f3f3f; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #8e8ea0; margin-bottom: 6px; }
    .pl-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .pl-row:last-child { margin-bottom: 0; }
    .pl-tag { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: 10px; font-weight: 700; white-space: nowrap; }
    .pl-tag.pre { background:#1e3a8a;color:#93c5fd; }
    .pl-tag.ret { background:#064e3b;color:#6ee7b7; }
    .pl-tag.post { background:#451a03;color:#fbbf24; }
    .pl-tag.gen  { background:#1f2937;color:#9ca3af; }
    .pl-txt { flex:1; line-height:1.6; }
    .pl-sub { font-size:11px; color:#6b7280; margin-top:2px; }

    /* 출처 */
    .src-wrap { margin-bottom: 6px; }
    .src-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .src-lbl { font-size: 11px; color: #6b7280; }
    .src-pill { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; background: transparent; border: 1px solid #3f3f3f; border-radius: 99px; font-size: 11px; color: #8e8ea0; cursor: pointer; }
    .src-pill:hover { border-color: #6b7280; color: #ececec; background: #2a2a2a; }
    .src-detail { background: #1a1a1a; border: 1px solid #3f3f3f; border-radius: 8px; padding: 10px; font-size: 12px; color: #9ca3af; line-height: 1.7; white-space: pre-wrap; margin-top: 4px; }
    .src-detail-hdr { font-size: 11px; color: #6b7280; margin-bottom: 4px; }

    /* 메타 */
    .meta { margin-top: 8px; }
    .act-row { display: flex; gap: 4px; }
    .meta-btn { display: flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 6px; border: none; background: transparent; color: #6b7280; font-size: 12px; cursor: pointer; }
    .meta-btn:hover { background: #2a2a2a; color: #ececec; }

    /* 입력 */
    .inp-wrap { padding: 16px 24px 18px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .inp-box { width: 100%; max-width: 720px; background: #2f2f2f; border: 1px solid #3f3f3f; border-radius: 16px; display: flex; align-items: flex-end; gap: 8px; padding: 10px 14px; }
    .inp-box:focus-within { border-color: #4b5563; }
    .inp-box textarea { flex: 1; background: transparent; border: none; outline: none; color: #ececec; font-size: 15px; resize: none; line-height: 1.6; max-height: 180px; font-family: inherit; }
    .inp-box textarea::placeholder { color: #6b7280; }
    .send { width: 36px; height: 36px; border-radius: 10px; border: none; background: #2563eb; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .send:hover:not(:disabled) { background: #1d4ed8; }
    .send:disabled { background: #3f3f3f; color: #6b7280; cursor: not-allowed; }
    .inp-hint { font-size: 11px; color: #4b5563; }

    /* 에러 */
    .err-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; gap: 14px; }
    .err-code { background: #2f2f2f; padding: 6px 14px; border-radius: 8px; color: #93c5fd; font-size: 13px; font-family: monospace; }
    .retry { padding: 10px 24px; background: #2563eb; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .retry:hover { background: #1d4ed8; }
  </style>
</head>
<body>
<div id="app" style="display:flex;width:100vw;height:100vh;align-items:center;justify-content:center">
  <div style="color:#8e8ea0;font-size:14px">연결 중...</div>
</div>
<script>
const API = "http://127.0.0.1:8000";
marked.setOptions({ breaks: true, gfm: true });
function md(t) { try { return marked.parse(t||""); } catch { return t||""; } }

const S = {
  messages: [],
  loading: false,
  err: null,
  activeFunc: null,
  openPl: {},
  openSrc: {},
};

const FUNCS = [
  { name:"search_youth_policy", icon:"🔍", label:"청년 정책 검색", desc:"Advanced RAG 파이프라인 실행" },
  { name:"list_policies",       icon:"📋", label:"정책 목록 조회", desc:"보유 문서 목록 반환" },
  { name:null,                  icon:"💬", label:"직접 답변",      desc:"함수 없이 바로 응답" },
];

function h(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==="cls") e.className=v;
    else if (k==="html") e.innerHTML=v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2),v);
    else if (k==="disabled"&&v) e.disabled=true;
    else e.setAttribute(k,v);
  }
  for (const c of kids) {
    if (c==null) continue;
    e.appendChild(typeof c==="string" ? document.createTextNode(c) : c);
  }
  return e;
}

// ── 전송 ──────────────────────────────────────────────
async function send(txt) {
  const text = (txt || document.getElementById("ti")?.value || "").trim();
  if (!text || S.loading) return;
  const ti = document.getElementById("ti");
  if (ti) { ti.value=""; ti.style.height="auto"; }

  S.messages.push({ role:"user", content:text });
  S.messages.push({ role:"assistant", content:"", toolCall:null, pipeline:null, hits:[], streaming:true });
  S.loading = true;
  const aiIdx = S.messages.length - 1;
  render();

  let acc = { content:"", toolCall:null, pipeline:null, hits:[] };

  try {
    const res = await fetch(`${API}/chat`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ message:text }),
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split("\n")) {
        if (!line.startsWith("data: ")) continue;
        let d; try { d=JSON.parse(line.slice(6)); } catch { continue; }

        if (d.type==="tool_call") {
          // 상태만 저장 → render() 호출 안 함 (첫 화면 깜빡임 방지)
          acc.toolCall = d;
          S.activeFunc = d.name;
          S.messages[aiIdx].toolCall = d;
          // 헤더 배지만 직접 업데이트
          const badge = document.querySelector(".dot");
          if (badge && badge.nextSibling)
            badge.nextSibling.textContent = d.name === "search_youth_policy"
              ? " 🔍 RAG 파이프라인 실행 중..."
              : " ⚙️ 처리 중...";
        }
        if (d.type==="pipeline") {
          // 상태만 저장 → render() 호출 안 함
          acc.pipeline = d;
          S.messages[aiIdx].pipeline = d;
        }
        if (d.type==="tool_result") {
          // 상태만 저장 → render() 호출 안 함
          acc.hits = d.hits || [];
          S.messages[aiIdx].hits = acc.hits;
        }
        if (d.type==="text") {
          acc.content += d.content;
          const box = document.getElementById("stream-box");
          if (box) {
            box.innerHTML = md(acc.content) + '<span class="cursor">▌</span>';
            document.getElementById("msg-end")?.scrollIntoView({behavior:"smooth"});
          }
        }
        if (d.type==="done") {
          // 완료 후 딱 한 번만 전체 render() → FC카드·파이프라인·출처 모두 표시
          S.messages[aiIdx] = {
            role:"assistant",
            content:acc.content,
            toolCall:acc.toolCall,
            pipeline:acc.pipeline,
            hits:acc.hits,
            streaming:false,
          };
          S.loading = false;
          S.activeFunc = null;
          render();
        }
      }
    }
    if (S.loading) {
      S.messages[aiIdx] = { role:"assistant", content:acc.content||"(응답 없음)", toolCall:acc.toolCall, pipeline:acc.pipeline, hits:acc.hits, streaming:false };
      S.loading = false;
      render();
    }
  } catch(e) {
    S.messages[aiIdx] = { role:"assistant", content:`오류: ${e.message}`, toolCall:null, pipeline:null, hits:[], streaming:false };
    S.loading = false;
    render();
  }
}

// ── 대화 초기화 ────────────────────────────────────────
async function clearChat() {
  await fetch(`${API}/conversation`, { method:"DELETE" });
  S.messages = [];
  S.openPl = {};
  S.openSrc = {};
  render();
}

// ── 메시지 렌더 ───────────────────────────────────────
function buildMsgs(container) {
  if (S.messages.length === 0) {
    const suggs = [
      {i:"🏠",t:"주거 지원",  d:"청년 월세 지원이 궁금해요"},
      {i:"💼",t:"취업 지원",  d:"취업 장려금 신청 방법은?"},
      {i:"💰",t:"금융 지원",  d:"청년도약계좌 자격 조건 알려줘"},
      {i:"📋",t:"정책 목록",  d:"어떤 청년 정책 정보가 있어?"},
    ];
    container.appendChild(h("div",{cls:"empty"},
      h("div",{cls:"empty-icon"},"🤖"),
      h("h2",{},"청년도우미 v3 · Function Calling"),
      h("p",{},
        "GPT가 질문 의도를 파악해 자동으로 함수를 선택합니다.\n"+
        "청년 정책 질문 → RAG 파이프라인 실행\n"+
        "목록 질문 → 보유 문서 조회"
      ),
      h("div",{cls:"sugg-grid"},
        ...suggs.map(s=>h("div",{cls:"sugg",onclick:()=>send(s.d)},
          h("div",{cls:"si"},s.i),
          h("div",{cls:"st"},s.t),
          h("div",{cls:"sd"},s.d),
        ))
      ),
    ));
    return;
  }

  for (let i=0; i<S.messages.length; i++) {
    const msg = S.messages[i];
    if (msg.role==="user") {
      container.appendChild(h("div",{cls:"u-row"}, h("div",{cls:"u-bubble"}, msg.content)));
      continue;
    }

    const isStreaming = msg.streaming && i===S.messages.length-1;
    const row = h("div",{cls:"a-row"});

    // Function Calling 카드
    if (msg.toolCall) {
      const fc = msg.toolCall;
      const funcInfo = FUNCS.find(f=>f.name===fc.name) || FUNCS[2];
      const box = h("div",{cls:`fc-box${fc.name?"":" direct"}`});
      box.appendChild(h("div",{cls:"fc-header"},
        h("span",{cls:`fc-badge ${fc.name?"call":"direct"}`}, fc.name?"함수 호출":"직접 답변"),
        h("span",{cls:"fc-name"}, `${funcInfo.icon} ${funcInfo.label}`),
      ));
      if (fc.args && Object.keys(fc.args).length>0) {
        const args = h("div",{cls:"fc-args"});
        for (const [k,v] of Object.entries(fc.args)) {
          args.appendChild(h("div",{},
            h("span",{cls:"fc-key"},k), document.createTextNode(": "),
            h("span",{cls:"fc-val"}, String(v)),
          ));
        }
        box.appendChild(args);
      }
      row.appendChild(h("div",{cls:"fc-wrap"},box));
    }

    // 파이프라인 단계
    if (msg.pipeline) {
      const pl = msg.pipeline;
      const plBtn = h("button",{cls:"meta-btn",onclick:()=>{
        S.openPl[i]=!S.openPl[i];
        const box=document.getElementById(`pl-${i}`);
        if(box) box.style.display=S.openPl[i]?"block":"none";
        plBtn.textContent=S.openPl[i]?"🔬 파이프라인 숨기기":"🔬 파이프라인 보기";
      }},"🔬 파이프라인 보기");

      const plBox = h("div",{cls:"pl-box",id:`pl-${i}`,style:`display:${S.openPl[i]?"block":"none"}`});
      const txt = h("div",{cls:"pl-txt"}, pl.query_type==="single"?"싱글홉 (1개 쿼리)":`멀티홉 (${(pl.queries||[]).length}개 쿼리)`);
      if ((pl.queries||[]).length>1) {
        const sub=h("div",{cls:"pl-sub"}); pl.queries.forEach(q=>{sub.appendChild(h("div",{},"• "+q));}); txt.appendChild(sub);
      }
      plBox.appendChild(h("div",{cls:"pl-row"},h("span",{cls:"pl-tag pre"},"Pre"),txt));
      plBox.appendChild(h("div",{cls:"pl-row"},h("span",{cls:"pl-tag ret"},"검색"),h("div",{cls:"pl-txt"},`Hybrid Search → ${pl.hits_count}개 후보`)));
      plBox.appendChild(h("div",{cls:"pl-row"},h("span",{cls:"pl-tag post"},"후처리"),h("div",{cls:"pl-txt"},"Re-ranking 완료")));
      plBox.appendChild(h("div",{cls:"pl-row"},h("span",{cls:"pl-tag gen"},"생성"),h("div",{cls:"pl-txt"},"GPT-4o-mini 스트리밍")));

      row.appendChild(h("div",{style:"margin-bottom:6px"},plBtn));
      row.appendChild(plBox);
    }

    // 답변 내용
    const contentEl = h("div",{cls:"a-content"});
    if (isStreaming) {
      contentEl.id = "stream-box";
      if (!msg.content) contentEl.appendChild(h("div",{cls:"dots"},h("span"),h("span"),h("span")));
      else contentEl.innerHTML = md(msg.content)+'<span class="cursor">▌</span>';
    } else {
      contentEl.innerHTML = md(msg.content);
    }
    row.appendChild(contentEl);

    // 완료 후 메타
    if (!isStreaming && msg.content) {
      const meta = h("div",{cls:"meta"});
      const actRow = h("div",{cls:"act-row"});

      const copyBtn = h("button",{cls:"meta-btn",onclick:()=>{
        navigator.clipboard.writeText(msg.content);
        copyBtn.textContent="✓ 복사됨";
        setTimeout(()=>{copyBtn.textContent="📋 복사";},1500);
      }},"📋 복사");
      actRow.appendChild(copyBtn);
      meta.appendChild(actRow);

      // 출처
      const hits = (msg.hits||[]).filter(h2=>h2&&h2.source);
      if (hits.length) {
        const srcRow = h("div",{cls:"src-row"},h("span",{cls:"src-lbl"},"출처"));
        hits.forEach((hit,j)=>{
          const key=`${i}-${j}`;
          const name=hit.source.replace(/\.[^.]+$/,"");
          const pill=h("span",{cls:"src-pill",onclick:()=>{
            S.openSrc[key]=!S.openSrc[key];
            const det=document.getElementById(`src-${key}`);
            if(det) det.style.display=S.openSrc[key]?"block":"none";
          }},`📄 ${name}`,h("span",{style:"opacity:.5"},` · ${(hit.similarity*100).toFixed(0)}%`));
          const det=h("div",{cls:"src-detail",id:`src-${key}`,style:`display:${S.openSrc[key]?"block":"none"}`},
            h("div",{cls:"src-detail-hdr"},`${hit.source} · 유사도 ${(hit.similarity*100).toFixed(0)}%`),
            hit.content,
          );
          srcRow.appendChild(pill);
          srcRow.appendChild(det);
        });
        meta.appendChild(h("div",{cls:"src-wrap"},srcRow));
      }
      row.appendChild(meta);
    }

    container.appendChild(row);
  }
  container.appendChild(h("div",{id:"msg-end"}));
}

// ── 전체 렌더 ─────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML="";
  app.style.cssText="display:flex;width:100vw;height:100vh;";

  if (S.err) {
    app.appendChild(h("div",{cls:"err-screen"},
      h("div",{style:"font-size:44px"},"⚠️"),
      h("div",{style:"font-size:20px;font-weight:700"},"서버에 연결할 수 없습니다"),
      h("div",{style:"font-size:14px;color:#8e8ea0;text-align:center;line-height:1.8"},
        "백엔드 서버를 먼저 실행하세요.",
        h("br"),
        h("span",{cls:"err-code"},"uvicorn server:app --reload"),
        h("div",{style:"font-size:12px;color:#f87171;margin-top:6px"},S.err),
      ),
      h("button",{cls:"retry",onclick:init},"🔄 다시 연결"),
    ));
    return;
  }

  // 사이드바
  const funcList = h("div",{cls:"func-list"});
  for (const f of FUNCS) {
    const isActive = S.activeFunc===f.name || (S.activeFunc===null && f.name===null && S.loading);
    funcList.appendChild(h("div",{cls:`func-item${isActive?" active":""}`},
      h("span",{cls:"func-icon"},f.icon),
      h("div",{},
        h("div",{cls:"func-name"},f.label),
        h("div",{cls:"func-desc"},f.desc),
      ),
    ));
  }

  app.appendChild(h("div",{cls:"sidebar"},
    h("div",{cls:"logo"},h("div",{cls:"logo-icon"},"🤖"),"청년도우미 v3"),
    h("button",{cls:"new-btn",onclick:clearChat},"✏️ 새 대화"),
    h("div",{cls:"sec-label"},"사용 가능한 함수"),
    funcList,
    h("div",{cls:"sidebar-foot"},
      "Function Calling + Advanced RAG\n"+
      "tool_choice: auto\n"+
      "GPT-4o-mini"
    ),
  ));

  // 메인
  const msgCont = h("div",{cls:"msgs"});
  buildMsgs(msgCont);

  const statusTxt = S.activeFunc==="search_youth_policy" ? "🔍 RAG 파이프라인 실행 중..."
    : S.activeFunc==="list_policies" ? "📋 정책 목록 조회 중..."
    : S.loading ? "⚙️ 처리 중..."
    : "GPT-4o-mini · Function Calling + Advanced RAG";

  const ta = h("textarea",{id:"ti",rows:"1",placeholder:"청년 정책에 대해 물어보세요... (Enter 전송, Shift+Enter 줄바꿈)"});
  if (S.loading) ta.disabled=true;
  ta.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,180)+"px";});
  ta.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});

  const sendBtn=h("button",{cls:"send",onclick:send},"↑");
  if (S.loading) sendBtn.disabled=true;

  app.appendChild(h("div",{cls:"main"},
    h("div",{cls:"hdr"},h("div",{cls:"badge"},h("div",{cls:"dot"}),statusTxt)),
    msgCont,
    h("div",{cls:"inp-wrap"},
      h("div",{cls:"inp-box"},ta,sendBtn),
      h("div",{cls:"inp-hint"},"Function Calling · Advanced RAG · Hybrid Search · Re-ranking"),
    ),
  ));

  setTimeout(()=>document.getElementById("msg-end")?.scrollIntoView(),0);
}

// ── 초기화 (서버 연결 + 대화 이력 복원) ──────────────
async function init() {
  try {
    await fetch(`${API}/health`);
    S.err = null;

    // 서버에 저장된 대화 이력 불러오기
    const conv = await fetch(`${API}/conversation`).then(r=>r.json());
    if (Array.isArray(conv) && conv.length > 0) {
      // user/assistant 쌍으로 메시지 복원
      for (let i = 0; i < conv.length - 1; i += 2) {
        const user = conv[i];
        const assistant = conv[i+1];
        if (user?.role==="user" && assistant?.role==="assistant") {
          S.messages.push({ role:"user", content:user.content });
          S.messages.push({ role:"assistant", content:assistant.content, toolCall:null, pipeline:null, hits:[], streaming:false });
        }
      }
    }

    render();
  } catch(e) {
    S.err = e.message||String(e);
    render();
  }
}
init();
</script>
