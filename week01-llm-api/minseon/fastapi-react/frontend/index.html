<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT-4o 챗봇 (FastAPI + React)</title>

  <!-- React CDN: 설치 없이 바로 사용 (학습용) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel: JSX 문법을 브라우저가 이해할 수 있게 변환 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 700px;
      height: 90vh;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    header .subtitle {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    /* 토큰 통계 바 */
    .stats {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 10px 24px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-size: 13px;
      color: #6b7280;
    }

    .stats span { flex: 1; }

    .stats button {
      padding: 5px 14px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      color: #374151;
      transition: background 0.15s;
    }

    .stats button:hover { background: #f3f4f6; }

    /* 메시지 영역 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      margin-top: 40px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
      align-items: flex-start;
    }

    .label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .content {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .content {
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .content {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    /* 스트리밍 커서 깜빡임 */
    .cursor {
      display: inline-block;
      animation: blink 0.8s infinite;
      color: #6b7280;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* 입력 영역 */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }

    .input-area input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-area input:focus { border-color: #2563eb; }
    .input-area input:disabled { background: #f9fafb; }

    .input-area button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .input-area button:hover:not(:disabled) { background: #1d4ed8; }
    .input-area button:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // FastAPI 서버 주소 (server.py 실행 주소)
    const API_URL = "http://localhost:8000";

    function App() {
      const [messages, setMessages]   = useState([]);
      const [input, setInput]         = useState("");
      const [isLoading, setIsLoading] = useState(false);
      const [usage, setUsage]         = useState({ input: 0, output: 0 });
      const messagesEndRef            = useRef(null);

      // 새 메시지가 오면 자동 스크롤
      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages]);

      const sendMessage = async () => {
        if (!input.trim() || isLoading) return;

        const userMessage = input.trim();
        setInput("");

        // 1. 사용자 메시지 화면에 추가
        setMessages(prev => [...prev, { role: "user", content: userMessage }]);

        // 2. AI 답변 자리 미리 추가 (스트리밍으로 채울 예정)
        setMessages(prev => [...prev, { role: "assistant", content: "" }]);
        setIsLoading(true);

        try {
          // 3. FastAPI 서버에 POST 요청 → 스트리밍 응답
          const response = await fetch(`${API_URL}/chat/stream`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: userMessage }),
          });

          // 4. 스트림을 한 줄씩 읽기
          const reader  = response.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            // SSE 형식 파싱: "data: {...}\n\n" → JSON
            const lines = decoder.decode(value).split("\n");
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const data = JSON.parse(line.slice(6));

              if (data.text) {
                // 5. 토큰 하나씩 마지막 메시지에 이어붙이기
                setMessages(prev => {
                  const updated = [...prev];
                  updated[updated.length - 1] = {
                    ...updated[updated.length - 1],
                    content: updated[updated.length - 1].content + data.text,
                  };
                  return updated;
                });
              }

              if (data.done) {
                // 6. 스트리밍 완료 → 토큰 사용량 업데이트
                setUsage(prev => ({
                  input:  prev.input  + data.usage.input,
                  output: prev.output + data.usage.output,
                }));
              }
            }
          }

        } catch (err) {
          setMessages(prev => {
            const updated = [...prev];
            updated[updated.length - 1] = {
              ...updated[updated.length - 1],
              content: `오류: ${err.message}\n서버가 실행 중인지 확인하세요.`,
            };
            return updated;
          });
        } finally {
          setIsLoading(false);
        }
      };

      const resetChat = async () => {
        await fetch(`${API_URL}/chat`, { method: "DELETE" });
        setMessages([]);
        setUsage({ input: 0, output: 0 });
      };

      return (
        <div className="container">
          <header>
            <h1>GPT-4o 챗봇</h1>
            <p className="subtitle">FastAPI (백엔드) + React (프론트엔드) — 1주차</p>
          </header>

          <div className="stats">
            <span>입력 토큰: {usage.input.toLocaleString()}</span>
            <span>출력 토큰: {usage.output.toLocaleString()}</span>
            <span>합계: {(usage.input + usage.output).toLocaleString()}</span>
            <button onClick={resetChat}>대화 초기화</button>
          </div>

          <div className="messages">
            {messages.length === 0 && (
              <div className="empty">메시지를 입력해서 대화를 시작하세요.</div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`message ${msg.role}`}>
                <div className="label">{msg.role === "user" ? "나" : "AI"}</div>
                <div className="content">
                  {msg.content}
                  {/* 스트리밍 중 마지막 AI 메시지에 커서 표시 */}
                  {msg.role === "assistant" && isLoading && i === messages.length - 1 && (
                    <span className="cursor">▌</span>
                  )}
                </div>
              </div>
            ))}
            <div ref={messagesEndRef} />
          </div>

          <div className="input-area">
            <input
              type="text"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && !e.shiftKey && sendMessage()}
              placeholder="메시지를 입력하세요... (Enter로 전송)"
              disabled={isLoading}
            />
            <button onClick={sendMessage} disabled={isLoading || !input.trim()}>
              {isLoading ? "생성 중..." : "전송"}
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
