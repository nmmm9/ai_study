<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청년정책 RAG 챗봇 (FastAPI + React)</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
    }

    /* ── 사이드바 ── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: white;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px 16px;
      gap: 16px;
    }

    .sidebar h2 { font-size: 17px; font-weight: 700; color: #111827; }
    .sidebar .caption { font-size: 12px; color: #6b7280; margin-top: 2px; }

    .sidebar-section h3 { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 10px; }

    hr { border: none; border-top: 1px solid #e5e7eb; }

    /* 파일 업로드 */
    .upload-btn {
      width: 100%;
      padding: 9px;
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      background: white;
      font-size: 13px;
      color: #6b7280;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s;
    }
    .upload-btn:hover { border-color: #2563eb; color: #2563eb; }
    input[type="file"] { display: none; }

    /* 소스 아이템 */
    .source-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #f9fafb;
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .source-item .src-name { font-size: 12px; font-weight: 600; color: #374151; }
    .source-item .src-cnt  { font-size: 11px; color: #6b7280; }
    .source-item .del-btn  {
      padding: 3px 8px; font-size: 11px; border: 1px solid #fca5a5;
      background: white; color: #ef4444; border-radius: 6px; cursor: pointer;
    }
    .source-item .del-btn:hover { background: #fef2f2; }

    /* 슬라이더 */
    .slider-group { margin-bottom: 12px; }
    .slider-group label { font-size: 12px; color: #374151; font-weight: 600; display: block; margin-bottom: 4px; }
    .slider-group input[type="range"] { width: 100%; accent-color: #2563eb; }
    .slider-group .val { font-size: 12px; color: #2563eb; font-weight: 700; }

    /* 통계 */
    .stat-row { display: flex; gap: 8px; }
    .stat-box {
      flex: 1; background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 8px; text-align: center;
    }
    .stat-box .lbl { font-size: 11px; color: #6b7280; }
    .stat-box .val { font-size: 18px; font-weight: 700; color: #111827; }

    .btn-sm {
      width: 100%; padding: 8px; background: #f3f4f6; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: 13px; cursor: pointer; color: #374151;
    }
    .btn-sm:hover { background: #e5e7eb; }
    .btn-primary {
      background: #2563eb; color: white; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── 메인 영역 ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #e5e7eb;
      background: white;
      padding: 0 24px;
    }
    .tab {
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    .tab:hover:not(.active) { color: #374151; }

    /* 탭 내용 */
    .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-panel.active { display: flex; }

    /* ── 챗봇 패널 ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty { text-align: center; color: #9ca3af; font-size: 14px; margin-top: 60px; }

    .message { display: flex; flex-direction: column; max-width: 80%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-label { font-size: 11px; color: #9ca3af; margin-bottom: 4px; font-weight: 600; }

    .msg-bubble {
      padding: 12px 16px; border-radius: 12px;
      font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .message.user .msg-bubble {
      background: #2563eb; color: white; border-bottom-right-radius: 4px;
    }
    .message.assistant .msg-bubble {
      background: #f3f4f6; color: #111827; border-bottom-left-radius: 4px;
    }

    .cursor { display: inline-block; animation: blink 0.8s infinite; color: #6b7280; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* 출처 칩 */
    .source-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .src-chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 6px; border-radius: 99px; font-size: 10px;
      background: transparent; border: 1px solid #e5e7eb; color: #9ca3af;
      cursor: pointer; transition: all 0.15s;
    }
    .src-chip:hover { border-color: #6b7280; color: #6b7280; background: #f9fafb; }
    .src-chip-detail {
      margin-top: 5px; background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 8px 10px; font-size: 11px; color: #374151;
      line-height: 1.6; white-space: pre-wrap;
    }

    /* 입력 영역 */
    .input-area {
      display: flex; gap: 10px; padding: 16px 24px;
      border-top: 1px solid #e5e7eb; background: white;
    }
    .input-area input {
      flex: 1; padding: 10px 16px; border: 1px solid #d1d5db; border-radius: 10px;
      font-size: 14px; outline: none; transition: border-color 0.15s;
    }
    .input-area input:focus { border-color: #2563eb; }
    .input-area input:disabled { background: #f9fafb; }
    .send-btn {
      padding: 10px 20px; background: #2563eb; color: white; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    .send-btn:hover:not(:disabled) { background: #1d4ed8; }
    .send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── 정보 패널 공통 ── */
    .info-panel {
      flex: 1; overflow-y: auto; padding: 24px;
    }
    .info-panel h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .info-panel .sub { font-size: 13px; color: #6b7280; margin-bottom: 20px; }

    .step-card {
      border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px;
      margin-bottom: 12px; background: white;
    }
    .step-card h3 { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .step-card p  { font-size: 13px; color: #374151; margin-bottom: 8px; }
    .step-card pre {
      background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 10px; font-size: 12px; color: #374151; white-space: pre-wrap;
    }

    .concept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .concept-card {
      background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px;
    }
    .concept-card h4 { font-size: 13px; font-weight: 700; color: #2563eb; margin-bottom: 8px; }
    .concept-card p  { font-size: 12px; color: #374151; line-height: 1.6; }

    .token-info { font-size: 12px; color: #6b7280; margin-top: 6px; }

    /* ── 프롬프트 프리셋 ── */
    .preset-bar { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 24px; background: white; border-bottom: 1px solid #f3f4f6; }
    .preset-btn { padding: 5px 14px; border-radius: 99px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid #e5e7eb; background: white; color: #374151; transition: all 0.15s; }
    .preset-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
    .preset-btn:hover:not(.active) { border-color: #2563eb; color: #2563eb; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const API = "http://localhost:8000";

    // ── 출처 칩 컴포넌트 ──────────────────────────────────
    function SourceChip({ hit, index }) {
      const [open, setOpen] = useState(false);
      return (
        <div>
          <span className="src-chip" onClick={() => setOpen(!open)} title={hit.source}>
            {index + 1} {hit.source.replace(/\.[^.]+$/, "")}
          </span>
          {open && (
            <div className="src-chip-detail">
              <div style={{fontWeight:600, marginBottom:4, fontSize:11, color:"#6b7280"}}>
                {hit.source} · 유사도 {(hit.similarity * 100).toFixed(0)}%
              </div>
              {hit.content}
            </div>
          )}
        </div>
      );
    }

    // ── 사이드바 ───────────────────────────────────────────
    function Sidebar({ sources, stats, settings, onSettingsChange, onDelete, onReset, tokens }) {
      return (
        <div className="sidebar">
          <div>
            <h2>🔍 청년정책 RAG 챗봇</h2>
            <div className="caption">4주차: FastAPI + React</div>
          </div>

          <hr />

          <div className="sidebar-section">
            <h3>📚 인덱싱된 문서</h3>
            <div style={{fontSize:"11px",color:"#9ca3af",marginBottom:"8px"}}>서버 시작 시 data/ 폴더 자동 인덱싱</div>
            {sources.length === 0
              ? <div style={{fontSize:"12px", color:"#9ca3af"}}>인덱싱 중...</div>
              : sources.map(s => (
                  <div className="source-item" key={s.source}>
                    <div>
                      <div className="src-name">{s.source}</div>
                      <div className="src-cnt">{s.chunks}개 청크</div>
                    </div>
                    <button className="del-btn" onClick={() => onDelete(s.source)}>삭제</button>
                  </div>
                ))
            }
          </div>

          <hr />

          <div className="sidebar-section">
            <h3>⚙️ 검색 설정</h3>
            {[
              {key:"top_k",         label:`top-k: ${settings.top_k}`,                    min:1, max:8,   step:1},
              {key:"threshold",     label:`유사도 임계값: ${settings.threshold}`,         min:0, max:1,   step:0.05},
              {key:"max_per_source",label:`문서당 최대: ${settings.max_per_source}`,      min:1, max:3,   step:1},
            ].map(s => (
              <div className="slider-group" key={s.key}>
                <label>{s.label}</label>
                <input type="range" min={s.min} max={s.max} step={s.step}
                  value={settings[s.key]}
                  onChange={e => onSettingsChange(s.key, s.step < 1 ? parseFloat(e.target.value) : parseInt(e.target.value))}
                />
              </div>
            ))}
          </div>

          <hr />

          <div className="sidebar-section">
            <h3>📊 통계</h3>
            <div className="stat-row">
              <div className="stat-box"><div className="lbl">문서</div><div className="val">{stats.total_documents}</div></div>
              <div className="stat-box"><div className="lbl">청크</div><div className="val">{stats.total_chunks}</div></div>
            </div>
            <div className="token-info">
              입력: {tokens.input.toLocaleString()} / 출력: {tokens.output.toLocaleString()} 토큰
            </div>
          </div>

          <hr />
          <button className="btn-sm" onClick={onReset}>대화 초기화</button>
        </div>
      );
    }

    // ── 챗봇 탭 ───────────────────────────────────────────
    const PRESETS = [
      { id:"default",  label:"📚 기본"    },
      { id:"friendly", label:"🤝 친절하게" },
      { id:"concise",  label:"⚡ 간결하게" },
      { id:"simple",   label:"🎓 쉽게"    },
      { id:"expert",   label:"💼 전문가"  },
    ];

    function ChatTab({ sources, settings }) {
      const [messages, setMessages] = useState([]);
      const [input, setInput]       = useState("");
      const [loading, setLoading]   = useState(false);
      const [preset,  setPreset]    = useState("default");
      const [tokens, setTokens]     = useState({ input: 0, output: 0 });
      const bottomRef               = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

      const send = async () => {
        if (!input.trim() || loading || sources.length === 0) return;
        const text = input.trim();
        setInput("");
        setMessages(prev => [...prev, { role: "user", content: text }, { role: "assistant", content: "", hits: [] }]);
        setLoading(true);

        try {
          const res = await fetch(`${API}/chat/stream`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, ...settings, preset }),
          });
          const reader  = res.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const lines = decoder.decode(value).split("\n");
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const data = JSON.parse(line.slice(6));

              if (data.type === "text") {
                setMessages(prev => {
                  const updated = [...prev];
                  updated[updated.length - 1] = {
                    ...updated[updated.length - 1],
                    content: updated[updated.length - 1].content + data.content,
                  };
                  return updated;
                });
              }
              if (data.type === "hits") {
                setMessages(prev => {
                  const updated = [...prev];
                  updated[updated.length - 1] = { ...updated[updated.length - 1], hits: data.hits };
                  return updated;
                });
              }
              if (data.type === "usage") {
                setTokens(prev => ({ input: prev.input + data.input, output: prev.output + data.output }));
              }
            }
          }
        } catch (err) {
          setMessages(prev => {
            const updated = [...prev];
            updated[updated.length - 1] = {
              ...updated[updated.length - 1],
              content: `오류: ${err.message}\n서버가 실행 중인지 확인하세요.`,
            };
            return updated;
          });
        } finally {
          setLoading(false);
        }
      };

      return (
        <>
          <div className="preset-bar">
            {PRESETS.map(p => (
              <button key={p.id} className={`preset-btn ${preset===p.id?"active":""}`}
                onClick={() => setPreset(p.id)}>{p.label}</button>
            ))}
          </div>
          <div className="messages">
            {messages.length === 0 && (
              <div className="empty">
                {sources.length === 0
                  ? "서버가 data/ 폴더를 인덱싱 중입니다. 잠시 후 새로고침하세요."
                  : "질문을 입력해서 대화를 시작하세요."}
              </div>
            )}
            {messages.map((msg, i) => (
              <div key={i} className={`message ${msg.role}`}>
                <div className="msg-label">{msg.role === "user" ? "나" : "AI"}</div>
                <div className="msg-bubble">
                  {msg.content}
                  {msg.role === "assistant" && loading && i === messages.length - 1 && (
                    <span className="cursor">▌</span>
                  )}
                </div>
                {msg.role === "assistant" && msg.hits && msg.hits.length > 0 && (
                  <div className="source-chips">
                    {msg.hits.map((h, j) => <SourceChip key={j} hit={h} index={j} />)}
                  </div>
                )}
              </div>
            ))}
            <div ref={bottomRef} />
          </div>
          <div className="input-area">
            <input
              type="text" value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && !e.shiftKey && send()}
              placeholder={sources.length === 0 ? "먼저 문서를 인덱싱하세요..." : "질문을 입력하세요... (Enter 전송)"}
              disabled={loading || sources.length === 0}
            />
            <button className="send-btn" onClick={send} disabled={loading || !input.trim() || sources.length === 0}>
              {loading ? "생성 중..." : "전송"}
            </button>
          </div>
        </>
      );
    }


    // ── 메인 앱 ───────────────────────────────────────────
    function App() {
      const [sources,  setSources]  = useState([]);
      const [stats,    setStats]    = useState({ total_documents: 0, total_chunks: 0 });
      const [tokens,   setTokens]   = useState({ input: 0, output: 0 });
      const [settings, setSettings] = useState({ top_k: 5, threshold: 0.2, max_per_source: 2 });

      const loadSources = async () => {
        const [s, st] = await Promise.all([
          fetch(`${API}/sources`).then(r => r.json()),
          fetch(`${API}/stats`).then(r => r.json()),
        ]);
        setSources(s);
        setStats(st);
      };

      useEffect(() => { loadSources(); }, []);

      const handleDelete = async (name) => {
        await fetch(`${API}/sources/${encodeURIComponent(name)}`, { method: "DELETE" });
        loadSources();
      };

      const handleReset = async () => {
        await fetch(`${API}/chat`, { method: "DELETE" });
        setTokens({ input: 0, output: 0 });
        window.location.reload();
      };

      const updateSetting = (key, val) => setSettings(prev => ({ ...prev, [key]: val }));

      return (
        <div style={{ display:"flex", width:"100vw", height:"100vh" }}>
          <Sidebar
            sources={sources} stats={stats} settings={settings} tokens={tokens}
            onSettingsChange={updateSetting}
            onDelete={handleDelete}
            onReset={handleReset}
          />
          <div className="main">
            <div className="tab-content">
              <div className="tab-panel active">
                <ChatTab sources={sources} settings={settings} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
